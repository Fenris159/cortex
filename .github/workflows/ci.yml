name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DENO_VERSION: "2.x"

jobs:
  quality:
    name: Lint & Format & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Check version consistency
        run: |
          FILE_VERSION=$(cat VERSION)
          JSON_VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
          if [ "$FILE_VERSION" != "$JSON_VERSION" ]; then
            echo "Version mismatch: VERSION=$FILE_VERSION deno.json=$JSON_VERSION"
            exit 1
          fi

      - run: deno lint
      - run: deno fmt --check
      - run: deno check src/main.ts

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - run: deno test --allow-all
