name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          JSON_VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
          if [ "$TAG_VERSION" != "$FILE_VERSION" ] || [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION VERSION=$FILE_VERSION deno.json=$JSON_VERSION"
            exit 1
          fi

      - name: Lint & type-check
        run: |
          deno lint
          deno fmt --check
          deno check src/main.ts

      - name: Cross-compile binaries
        run: |
          PLATFORMS=(
            "x86_64-unknown-linux-gnu:cortex-x86_64-linux"
            "aarch64-unknown-linux-gnu:cortex-aarch64-linux"
            "x86_64-apple-darwin:cortex-x86_64-darwin"
            "aarch64-apple-darwin:cortex-aarch64-darwin"
            "x86_64-pc-windows-msvc:cortex-x86_64-windows.exe"
          )
          mkdir -p dist
          for pair in "${PLATFORMS[@]}"; do
            TARGET="${pair%%:*}"
            NAME="${pair##*:}"
            deno compile --target "$TARGET" --output "dist/$NAME" src/main.ts
          done

      - name: Package artifacts
        run: |
          cd dist
          for file in cortex-*; do
            if echo "$file" | grep -q '\.exe$'; then
              zip "${file%.exe}.zip" "$file"
            else
              tar czf "${file}.tar.gz" "$file"
            fi
          done
          rm -f cortex-*.exe cortex-*
          sha256sum cortex-*.tar.gz cortex-*.zip > checksums.txt

      - name: Sign checksums
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import
          gpg --detach-sign --armor checksums.txt
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true